app = "hellonodetest"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "test"
  HTTP_PORT = "3000"

[http_service]
  internal_port = 3000
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "30s"
    method        = "GET"
    path          = "/"
    timeout       = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
