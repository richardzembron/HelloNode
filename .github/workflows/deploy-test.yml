name: Deploy to Test

on:
  push:
    branches: ["test"]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm install
      - run: npm test

  deploy:
    name: Deploy to hellonodetest.fly.dev
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Run DB migration
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl ssh console \
            --app hellonodetest \
            --config fly.test.toml \
            -C "node src/migrate.js" 2>/dev/null || echo "Migration skipped (first deploy)"

      - name: Deploy to Fly.io Test
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --config fly.test.toml --remote-only
