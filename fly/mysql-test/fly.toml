app = "hellonodetest-db"
primary_region = "iad"

[build]
  image = "mysql:8.0"

[env]
  MYSQL_DATABASE = "hellonode_test"

[[mounts]]
  source      = "mysql_data"
  destination = "/var/lib/mysql"

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1

[[services]]
  internal_port = 3306
  protocol      = "tcp"

  [[services.ports]]
    port = 3306
